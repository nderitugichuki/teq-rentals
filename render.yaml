databases:
  - name: teq-rentals-db
    databaseName: teq_rentals
    user: teq_rentals_user
    plan: free

services:
  - type: web
    name: teq-rentals-api
    runtime: docker
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: teq-rentals-api.onrender.com
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: https://teq-rentals.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://teq-rentals.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: teq-rentals-db
          property: connectionString
      - key: ANON_THROTTLE_RATE
        value: 60/minute
      - key: USER_THROTTLE_RATE
        value: 1000/hour

  - type: web
    name: teq-rentals
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://teq-rentals-api.onrender.com/api/v1
